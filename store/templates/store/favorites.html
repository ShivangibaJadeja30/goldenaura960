{% extends "store/base.html" %}
{% block title %}My Favorites{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">My Favorites</h2>
  <div class="row">
    {% for fav in favorites %}
    <div class="col-md-4 mb-4">
      <div class="card h-100">
        <img src="{{ fav.product.image.url }}" class="card-img-top" alt="{{ fav.product.name }}">
        <div class="card-body">
          <h5 class="card-title">{{ fav.product.name }}</h5>
          <p class="card-text">₹{{ fav.product.price }}</p>
          <a href="{% url 'product_detail' fav.product.id %}" class="btn btn-info">View Details</a>
        </div>
      </div>
    </div>
    {% empty %}
    <p>No favorites yet. Start adding jewellery you love!</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
