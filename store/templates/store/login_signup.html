{% extends "store/base.html" %}
{% block title %}Login / Signup{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <h3>Login</h3>
    <form method="post">
      {% csrf_token %}
      {{ login_form.as_p }}
      <button type="submit" name="login" class="btn btn-gold">Login</button>
    </form>
  </div>
  <div class="col-md-6">
    <h3>Signup</h3>
    <form method="post">
      {% csrf_token %}
      {{ signup_form.as_p }}
      <button type="submit" name="signup" class="btn btn-gold">Signup</button>
    </form>
  </div>
</div>
{% endblock %}
