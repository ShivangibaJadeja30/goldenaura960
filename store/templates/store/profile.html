{% extends "store/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>My Profile</h2>
  <div class="card" style="max-width: 600px;">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <h5>Account Info</h5>
        {{ user_form.as_p }}
        <h5>Profile Info</h5>
        {{ profile_form.as_p }}
        <button type="submit" class="btn btn-warning">Save Changes</button>
      </form>

      {% if user_form.errors %}
        <div class="alert alert-danger">{{ user_form.errors }}</div>
      {% endif %}
      {% if profile_form.errors %}
        <div class="alert alert-danger">{{ profile_form.errors }}</div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
