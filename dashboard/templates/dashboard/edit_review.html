{% extends "dashboard/dashboard_base.html" %}
{% block title %}Edit Review{% endblock %}
{% block content %}
<h2>Edit Review</h2>
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label>Rating</label>
    <input type="number" name="rating" value="{{ review.rating }}" min="1" max="5" class="form-control">
  </div>
  <div class="form-group">
    <label>Comment</label>
    <textarea name="comment" class="form-control">{{ review.comment }}</textarea>
  </div>
  <button type="submit" class="btn btn-success">Save Changes</button>
  <a href="{% url 'review_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
