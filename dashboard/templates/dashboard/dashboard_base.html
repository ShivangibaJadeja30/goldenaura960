<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px;
      background-color: #343a40;
      color: #fff;
      flex-shrink: 0;
    }
    .sidebar a {
      color: #fff;
      display: block;
      padding: 10px 15px;
      text-decoration: none;
    }
    .sidebar a:hover { background-color: #495057; }
    .content { flex-grow: 1; padding: 20px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h4 class="p-3">Admin Panel</h4>
    <a href="{% url 'dashboard_home' %}">🏠 Home</a>
    <a href="{% url 'order_list' %}">📦 Orders</a>
    <a href="{% url 'review_list' %}">⭐ Reviews</a>
    <a href="{% url 'dashboard_feedback_list' %}">💬 Feedback</a>
    <a href="{% url 'analytics_dashboard' %}">📊 Analytics</a>
    
    <hr class="text-white mx-2 my-1">
    <small class="text-muted px-3 text-uppercase fw-bold" style="font-size: 0.75rem;">Catalog</small>
    <a href="{% url 'dashboard_category_list' %}">📁 Categories</a>
    <a href="{% url 'dashboard_product_list' %}">💎 Products</a>
    
    <hr class="text-white mx-2 my-1">
    <a href="{% url 'logout' %}">🚪 Logout</a>
  </div>

  <div class="content">
    {% if messages %}
      <div class="container mt-3">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}
    {% endblock %}
  </div>
</body>
</html>
